<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Glowing background elements -->
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00" />
      <stop offset="100%" stop-color="#FF4D00" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glowing hexagon -->
  <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" stroke="url(#neonGlow)" stroke-width="4" fill="#121212" filter="url(#glow)" />
  <!-- Futuristic Robot Eye / Core -->
  <circle cx="50" cy="50" r="16" fill="url(#neonGlow)" filter="url(#glow)" />
  <circle cx="50" cy="50" r="8" fill="#121212" />
  <circle cx="50" cy="50" r="3" fill="#FFFFFF" />
  <!-- Circuit tracks -->
  <path d="M 50 10 L 50 24 M 50 76 L 50 90 M 15 30 L 30 38 M 85 30 L 70 38 M 15 70 L 30 62 M 85 70 L 70 62" stroke="url(#neonGlow)" stroke-width="2" />
</svg>
